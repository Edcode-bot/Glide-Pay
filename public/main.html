<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Axe App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: #1c1c2b;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      padding-bottom: 100px;
    }
    .navbar-custom {
      background: #1c1c2b;
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1rem;
      font-weight: 600;
    }
    .wallet-card {
      background: linear-gradient(135deg, #ff8a00, #e52e71);
      border-radius: 20px;
      padding: 1.5rem;
      margin: 1rem 0;
      color: #fff;
    }
    .currency-card {
      background: #2d2d44;
      padding: 1rem;
      margin: 0.5rem;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      flex: 1;
    }
    .options-card {
      background: #2d2d44;
      border-radius: 15px;
      padding: 1rem;
      margin: 1rem 0;
    }
    .option-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      text-align: center;
    }
    .option-grid a div {
      background: #3c3c5a;
      padding: 1rem;
      border-radius: 12px;
      color: #fff;
      font-size: 0.9rem;
    }
    .history-card {
      background: #2d2d44;
      border-radius: 15px;
      padding: 1rem;
      color: #ccc;
    }
    .nav-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #2d2d44;
      border-top: 1px solid #444;
      display: flex;
      justify-content: space-around;
      align-items: center;
      height: 60px;
      z-index: 1000;
    }
    .nav-bottom i {
      font-size: 1.4rem;
      color: #ffa726;
    }
    .center-btn {
      background: #ffa726;
      color: #000;
      border-radius: 50%;
      width: 55px;
      height: 55px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: -25px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    #cryptoPopup {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #2d2d44;
      border-top: 1px solid #555;
      padding: 1rem;
      color: #fff;
      z-index: 2000;
    }
    #cryptoPopup button {
      width: 100%;
      margin-bottom: 10px;
    }
    .option-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1rem;
  text-align: center;
}
.option-card {
  background: #1c1b3b;
  border-radius: 16px;
  color: white;
  box-shadow: 0 0 10px rgba(255, 165, 0, 0.2);
  text-decoration: none;
}
.option-card:hover {
  background: #ff7e5f;
  color: white;
}
  </style>
</head>
<body>
  <div class="navbar-custom">
    <span>Hello <span id="username">User</span> 👋</span>
    <i class="fas fa-bell"></i>
  </div>

  <div class="container">
    <div class="wallet-card">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <div class="small">Wallet Balance</div>
          <h2>UGX <span id="balance">0</span></h2>
        </div>
        <div class="d-flex flex-column gap-2">
          <button class="btn btn-light btn-sm" onclick="location.href='add-cash.html'">Add Cash</button>
          <button class="btn btn-dark btn-sm" onclick="location.href='withdraw.html'">Withdraw</button>
        </div>
      </div>
      <div class="d-flex justify-content-between mt-4">
        <div class="currency-card" onclick="showPopup('USDT')">0.01<br><strong>USDT</strong></div>
        <div class="currency-card" onclick="showPopup('USDC')">&lt;0.01<br><strong>USDC</strong></div>
        <div class="currency-card" onclick="showPopup('cUSD')">&lt;0.01<br><strong>cUSD</strong></div>
      </div>
    </div>

    <div class="text-center my-4">
      <button class="btn btn-warning" onclick="startDivviReferral()">Claim Referral Rewards</button>
    </div>
    
    <div class="options-card">
      <h5 class="text-white mb-3">Services</h5>
      <div class="option-grid">

        <a href="https://glidepay.app/rent" target="_blank" class="option-card">
          <i class="fas fa-home"></i><br>Housing
        </a>

        <a href="https://www.airtel.ug/selfcare" target="_blank" class="option-card">
          <i class="fas fa-mobile-alt"></i><br>Airtime
        </a>

        <a href="https://www.payway.ug/service/umeme" target="_blank" class="option-card">
          <i class="fas fa-bolt"></i><br>Electricity
        </a>

        <a href="https://www.payway.ug/service/nwsc" target="_blank" class="option-card">
          <i class="fas fa-tint"></i><br>Water
        </a>

        <a href="https://fonkwallet.com/send" target="_blank" class="option-card">
          <i class="fas fa-paper-plane"></i><br>Send
        </a>

        <a href="https://claim.minipay.xyz/donate" target="_blank" class="option-card">
          <i class="fas fa-heart"></i><br>Donations
        </a>

      </div>

  <div class="nav-bottom">
    <a href="#"><i class="fas fa-home"></i></a>
    <a href="/chat" class="center-btn"><i class="fas fa-comment-dots"></i></a>
    <a href="invest.html"><i class="fas fa-chart-line"></i></a>
  </div>

  <div id="cryptoPopup">
    <h5 class="mb-3">Choose Action</h5>
    <button class="btn btn-outline-success" onclick="openDeposit()">Deposit</button>
    <button class="btn btn-outline-warning" onclick="openTransfer()">Transfer</button>
    <button class="btn btn-outline-light" onclick="closePopup()">Cancel</button>
  </div>

  <script>
    let selectedCurrency = "";
    function showPopup(currency) {
      selectedCurrency = currency;
      document.getElementById("cryptoPopup").style.display = "block";
    }
    function closePopup() {
      document.getElementById("cryptoPopup").style.display = "none";
    }
    function openDeposit() {
      window.location.href = "wallet-deposit.html?currency=" + selectedCurrency;
    }
    function openTransfer() {
      window.location.href = "wallet-transfer.html?currency=" + selectedCurrency;
    }

    fetch('/balance')
      .then(res => res.json())
      .then(data => document.getElementById('balance').innerText = data.balance);

    fetch('/user')
      .then(res => res.json())
      .then(data => document.getElementById('username').innerText = data.name || 'User');

    fetch('/transactions')
      .then(res => res.json())
      .then(txs => {
        const history = document.getElementById('history-list');
        history.innerHTML = '';
        txs.forEach(tx => {
          const item = document.createElement('div');
          item.className = 'd-flex justify-content-between border-bottom py-1';
          item.innerHTML = `<span>${tx.type}</span><span>${tx.amount}</span>`;
          history.appendChild(item);
        });
      });
  </script>
      <!-- Toast Container -->
      <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 9999">
        <div id="toastDivvi" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
          <div class="d-flex">
            <div id="toastBody" class="toast-body">Success!</div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
          </div>
        </div>
      </div>

      <!-- Divvi Integration -->
      <script type="module">
        import { getDataSuffix, submitReferral } from 'https://cdn.jsdelivr.net/npm/@divvi/referral-sdk/+esm';
        import { createWalletClient, custom } from 'https://esm.sh/viem';
        import { celo } from 'https://esm.sh/viem/chains';

        // Toast helper
        function showToast(message, type = 'success') {
          const toastEl = document.getElementById('toastDivvi');
          const toastBody = document.getElementById('toastBody');

          toastBody.textContent = message;
          toastEl.className = `toast align-items-center text-white bg-${type} border-0`;

          const toast = new bootstrap.Toast(toastEl);
          toast.show();
        }

        window.startDivviReferral = async function () {
          try {
            if (!window.ethereum) {
              showToast('Wallet not found. Please install MetaMask or Celo Extension Wallet.', 'danger');
              return;
            }

            const addresses = await window.ethereum.request({ method: 'eth_requestAccounts' });
            if (!addresses || addresses.length === 0) {
              showToast('Wallet not connected.', 'danger');
              return;
            }

            const account = addresses[0];

            const walletClient = createWalletClient({
              chain: celo,
              transport: custom(window.ethereum),
              account
            });

            const dataSuffix = getDataSuffix({
              consumer: '0xe38a456433fff7814e40998cf0cbbbd2c885b513',
              providers: [] // Leave empty for now (no active campaigns)
            });

            const txHash = await walletClient.sendTransaction({
              account,
              to: '0x0000000000000000000000000000000000000000',
              data: '0x' + dataSuffix,
              value: 0n
            });

            const chainId = await walletClient.getChainId();
            console.log("Referral transaction sent. Hash:", txHash);
            console.log("Chain ID:", chainId);

            try {
              await submitReferral({ txHash, chainId });
              showToast('Referral submitted successfully!', 'success');
            } catch (referralError) {
              console.warn('submitReferral failed:', referralError);
              if (referralError.message.includes('No providers found')) {
                showToast('Referral already submitted or no active campaign.', 'info');
              } else {
                showToast('Referral sent, but tracking failed.', 'warning');
              }
            }

          } catch (err) {
            console.error('Referral failed:', err);
            showToast('Transaction failed. Check wallet/network.', 'danger');
          }
        };
      </script>
</body>
</html>
